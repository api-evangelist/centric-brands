  - type: Features
    data:
      - name: Brand Centric
        description: >-
          Creative, multi-faceted brand stewardship committed to "protecting
          our brands' DNA by generating long-term value" for partners and
          licensors. First of the company's "4 Cs."
      - name: Business Centric
        description: >-
          Operational-excellence platform described as "the foundation for
          a transformational organization – the platform that enables
          superior end-to-end agility." Second of the "4 Cs."
      - name: Customer Centric
        description: >-
          Consumer-driven product and merchandising model delivering
          "unparalleled customer solutions that generate remarkable
          performance and exceptional experiences." Third of the "4 Cs."
      - name: People Centric
        description: >-
          Talent and culture program emphasizing a "dynamic, transparent,
          and unified culture." Fourth of the "4 Cs."
      - name: 3D Design and Art Studio
        description: >-
          Greensboro, NC creative facility producing 3D design and art
          assets across the brand portfolio, part of Centric's "expansive
          creative resources."
      - name: Photo and Video Studio
        description: >-
          New York City "state-of-the-art photo and video studio" used for
          campaign, e-commerce, and brand content production.
      - name: 11 End-to-End Ecommerce Sites
        description: >-
          Direct-to-consumer e-commerce operations running across eleven
          brand sites with full merchandising, fulfillment, and CX scope.
      - name: Global Sourcing Network
        description: >-
          Diversified Asia-anchored supply chain with offices in Hong Kong,
          China (Guangzhou, Hangzhou, Qingdao, Shanghai, Shenzhen, Zhuji),
          Bangladesh, Cambodia, India, and Vietnam. Partnerships with the
          International Labor Organization and Better Work for compliance.
      - name: Sports & Entertainment Licensing Group
        description: >-
          Dedicated licensing division (led by Janice Brown since 2018)
          handling 70+ entertainment, sports, character, and CPG licensed
          IP for accessories and beauty.
      - name: Asia Operating Region
        description: >-
          Regional management hub for Greater China and Southeast Asia
          sourcing/manufacturing, led by President Marc Compagnon (since
          March 2022).
      - name: EMEA Operating Region
        description: >-
          European, Middle East, and Africa region with London and
          Amsterdam offices, led by Managing Director Will van Rensburg.
      - name: Luxury and Streetwear Division
        description: >-
          Premium-tier division led by Andrew Berg, overseeing labels
          "including Robert Graham, Avirex, Off White, Herve Leger."
      - name: Lifestyle Division
        description: >-
          Operating division led by President Brent Unger since October
          2023, covering mainstream lifestyle apparel brands.
      - name: Accessories Group
        description: >-
          Largest single product group, led by Group President Jarrod Kahn
          since October 2018; spans 40+ licensed and owned accessories
          brands across handbags, small leather goods, watches, eyewear,
          hosiery, and headwear.
      - name: Kids Division
        description: >-
          Children's apparel division led by President Rob Smith,
          "responsible for leading the Division across all global brands
          and categories."
      - name: Social Compliance Program
        description: >-
          Internal social-compliance team (recently spotlighted in
          February 2026 news) monitoring factory ethics, labor standards,
          and ESG criteria across the Asia sourcing base.
