name: Centric Brands
description: >-
  Centric Brands LLC is a New York-headquartered global lifestyle brand
  management and product-development platform formed in October 2018 when
  Differential Brands Group (NASDAQ: DFBG) acquired Global Brands Group's
  $1.2B North American licensing business. The company designs, sources,
  markets, and distributes apparel, accessories, footwear, beauty, and
  entertainment-licensed products across men's, women's, kids', accessories,
  and entertainment segments. Its mission is "to be a leading global apparel
  & accessories company with a portfolio of iconic licensed and owned
  brands that delight retailers and consumers of all ages." Centric filed
  for Chapter 11 bankruptcy on May 18, 2020 and emerged in October 2020
  under control of secured creditors led by Blackstone's GSO Capital
  Partners, Ares Management, and HPS Investment Partners. The company is
  led by CEO Jason Rabin (since 2018) and operates ~20 global offices
  across New York (HQ), Los Angeles, Greensboro, Montreal, London,
  Amsterdam, Hong Kong, and multiple cities in China, Bangladesh,
  Cambodia, India, and Vietnam. Owned brands include Hudson Jeans,
  Buffalo Jeans, Robert Graham, Joe's Jeans, Hervé Léger, Favorite
  Daughter, and AllSaints; licensed apparel brands include Calvin Klein,
  Tommy Hilfiger, Nautica, Spyder, IZOD, Van Heusen, Kate Spade New York,
  Coach, Michael Kors, Frye, Timberland, Lucky Brand, Juicy Couture,
  Under Armour, and Off-White; the entertainment licensing portfolio
  spans 70+ properties including Disney, Marvel, Warner Bros., DC,
  Nintendo, Hasbro, Mattel, Nickelodeon, Netflix, Pokémon, Sanrio,
  Paw Patrol, and the NFL/MLB/NBA/NHL via Sports & Entertainment
  Licensing. Centric Brands operates "11 end-to-end Ecommerce sites,"
  a 3D design and art studio in Greensboro, and a New York City
  photo/video studio. The company has no public developer program,
  no documented public APIs, and no public source code repositories;
  its two namesake GitHub organizations (centric-brands, Centricbrands)
  are private placeholders with zero public repos.
