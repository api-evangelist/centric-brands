  - type: CorporateHistory
    data:
      - name: 2018 - Formation
        description: >-
          October 2018 - Differential Brands Group (NASDAQ: DFBG), itself
          formed from the 2015 merger of Joe's Jeans Inc. and Hudson
          Holdings, acquired Global Brands Group's $1.2B North American
          licensing business and rebranded as Centric Brands.
      - name: 2020 - Chapter 11 Filing
        description: >-
          May 18, 2020 - Centric Brands and 25 affiliates filed for
          Chapter 11 protection in the Southern District of New York,
          citing COVID-19 retail disruption on top of a heavy debt load
          inherited from the 2018 acquisition.
      - name: 2020 - Emergence
        description: >-
          October 2020 - Centric emerged from Chapter 11 with roughly
          $700M of debt eliminated. Secured creditors led by Blackstone's
          GSO Capital Partners, Ares Management, and HPS Investment
          Partners took control via debt-for-equity swap; Centric became
          a privately held company.
      - name: 2022-2024 - Post-Emergence Expansion
        description: >-
          Added new licenses and acquired Jennifer Fisher (early 2024);
          expanded EMEA leadership; Marc Compagnon appointed President,
          Asia (March 2022); Brent Unger elevated to President, Lifestyle
          (October 2023).
      - name: 2025 - Operations Leadership
        description: >-
          January 2025 - Mike Yerkes appointed COO, consolidating Supply
          Chain, IT, ESG Compliance, and Facilities.
      - name: 2026 - New Partnerships
        description: >-
          January 2026 - Palm Tree Crew joint venture launched; February
          2026 - Hudson Jeans named Danielle and Alix in-house stylists;
          May 2026 - new licensing deals for Vanessa Hudgens' A Star Is
          Born kids brand. Strategic licensing partnership with Claire's
          ongoing.
  - type: NotableAbsences
    data:
      - name: No Public API Program
        description: >-
          Centric Brands publishes no developer portal, no API
          documentation, no OpenAPI/AsyncAPI specs, and no public SDKs.
          Wholesale and licensor data exchange happens via EDI and
          private partner systems, not public REST APIs.
      - name: No Public Source Code
        description: >-
          Both namesake GitHub orgs (github.com/centric-brands,
          github.com/Centricbrands) exist as empty placeholders with
          zero public repositories.
      - name: No Public Pricing or Status Page
        description: >-
          As a wholesale/licensing operator (not a SaaS vendor),
          Centric Brands has no public price list, rate limits, or
          status page.
      - name: No Public Financials Since Going Private
        description: >-
          Following October 2020 emergence under PE ownership,
          Centric no longer files SEC reports; the Sports landing
          page and several category pages on the corporate site
          currently return 404.
      - name: No Investor Relations Surface
        description: >-
          As a privately held PE-owned company, Centric has no
          investor relations site, no earnings calls, and no annual
          report disclosure.
